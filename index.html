<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Samu-Gym</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header>
      <div>
        <h1 id="title">Samu-Gym</h1>
        <p id="subtitle">Home Training System</p>
      </div>
      <div id="status">Pronto</div>
    </header>

    <section class="card">
      <div class="topline">
        <span id="round">Giro 1/3</span>
        <span id="step">Esercizio 1/12</span>
      </div>

      <h2 id="group">PETTO</h2>
      <h3 id="exercise">Panca piana bilanciere</h3>

      <div class="content">
        <div class="imageBox">
          <img id="exerciseImg" alt="Immagine esercizio" />
          <div id="imageFallback">Metti qui l'immagine<br><small>img/nome.jpg</small></div>
        </div>

        <div class="info">
          <div id="target" class="target">8-10 reps</div>
          <ul id="tips"></ul>
          <div id="timer" class="timer hidden">00:45</div>
        </div>
      </div>

      <div class="progress">
        <div id="bar"></div>
      </div>

      <div class="buttons">
        <button id="prev">◀ Indietro</button>
        <button id="pause">⏸ Pausa</button>
        <button id="done" class="primary">FATTO / AVANTI ▶</button>
      </div>

      <p class="help">
        Telecomando/tastiera: OK/Invio/Spazio = avanti · P = pausa · Frecce = avanti/indietro
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
